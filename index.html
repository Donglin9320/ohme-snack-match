<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OHME! public snack shelf guide and survey-based product matcher." />
    <link rel="canonical" href="https://donglin9320.github.io/ohme-snack-match/snack-match/" />
    <link rel="icon" href="data:," />
    <title>OHME! Snack Match</title>
    <script>
      const destination = new URL("snack-match/", window.location.href);
      destination.search = window.location.search;
      destination.hash = window.location.hash;
      window.location.replace(destination.href);
    </script>
    <noscript><meta http-equiv="refresh" content="0; url=snack-match/" /></noscript>
    <style>
      :root { --ink: #18120f; --paper: #fffdf7; --mint: #d9f2d5; --red: #d74331; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--red);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 620px;
        border: 2px solid var(--ink);
        border-radius: 28px;
        background: var(--paper);
        padding: clamp(28px, 7vw, 64px);
        text-align: center;
      }
      h1 { margin: 0 0 14px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(42px, 9vw, 76px); line-height: 0.9; }
      p { margin: 0 0 24px; line-height: 1.55; }
      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--ink);
        border-radius: 999px;
        background: var(--mint);
        padding: 12px 18px;
        color: var(--ink);
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OHME!</h1>
      <p>Taking you to OHME! Snack Match.</p>
      <a href="snack-match/">Find your OHME snack</a>
    </main>
  </body>
</html>
