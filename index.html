<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OHME! Package Size Comparator</title>
    <style>
:root {
  --ink: #211f1d;
  --muted: #6c625e;
  --line: #eadbd5;
  --surface: #fff7f3;
  --panel: #ffffff;
  --brand-red: #d2291f;
  --brand-red-dark: #a91812;
  --brand-cream: #fff1e8;
  --brand-pink: #ffe4df;
  --blue: #245f73;
  --blue-soft: #e1f1f5;
  --green: #23745b;
  --green-soft: #dff3e9;
  --orange: #b06b2f;
  --orange-soft: #f5e6d6;
  --costco-red: #b3202a;
  --costco-blue: #17598c;
  --costco-soft: #fff5f3;
  --costco-blue-soft: #e8f2fa;
  --danger: #a43f46;
  --shadow: 0 14px 32px rgba(30, 45, 58, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    linear-gradient(180deg, #fff9f5 0%, #fff3ee 48%, #f7fbfb 100%);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app {
  min-height: 100vh;
}

.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 24px;
  align-items: center;
  padding: 24px 32px 18px;
  background: #fffdfb;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 20;
}

.eyebrow {
  margin: 0 0 7px;
  color: var(--brand-red);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 32px;
  line-height: 1.12;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 12px;
  font-size: 18px;
}

h3 {
  margin: 0 0 8px;
  font-size: 14px;
}

.top-note {
  padding: 12px 14px;
  border-left: 4px solid var(--brand-red);
  background: var(--brand-cream);
  color: #344250;
  font-size: 14px;
  line-height: 1.4;
}

main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px 32px 40px;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  color: var(--brand-red);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0;
}

.brand-dot {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: var(--brand-red);
  box-shadow: 18px 0 0 #f1c7bb, 36px 0 0 #f4d86a;
}

.app-nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
  max-width: 760px;
}

.nav-btn {
  min-height: 36px;
  border: 1px solid #efc8c0;
  border-radius: 999px;
  background: #fff8f4;
  color: #5a3e38;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 800;
}

.nav-btn.active {
  border-color: var(--brand-red);
  background: var(--brand-red);
  color: #ffffff;
}

.page-shell {
  display: grid;
  gap: 18px;
}

.page-intro {
  display: grid;
  grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
  gap: 18px;
  align-items: stretch;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffdfb;
  padding: 18px;
}

.page-intro h2 {
  margin-bottom: 8px;
  font-size: 24px;
}

.page-intro p {
  margin-bottom: 0;
  color: var(--muted);
  line-height: 1.48;
}

.quick-read {
  border: 1px solid #efc8c0;
  border-radius: 8px;
  background: var(--brand-cream);
  padding: 14px;
}

.quick-read strong {
  display: block;
  margin-bottom: 6px;
  color: var(--brand-red-dark);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.summary-card {
  min-height: 150px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  padding: 16px;
}

.summary-card h3 {
  color: var(--brand-red);
  font-size: 15px;
}

.summary-card p {
  color: #433a36;
  font-size: 14px;
  line-height: 1.45;
}

.callout-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.callout-pill {
  border: 1px solid #efc8c0;
  border-radius: 8px;
  background: #fffaf7;
  padding: 12px;
}

.callout-pill span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}

.callout-pill strong {
  display: block;
  margin-top: 4px;
  color: var(--ink);
  font-size: 17px;
}

.toolbar,
  .comparison-shell,
  .detail-grid > article,
  .picker-section,
  .strategy-section,
  .matrix-section,
  .edit-section {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) minmax(240px, 1.2fr) auto auto;
  gap: 14px;
  align-items: end;
  padding: 16px;
  margin-bottom: 18px;
}

label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

select,
input,
textarea {
  width: 100%;
  min-height: 38px;
  border: 1px solid #bdc8d2;
  border-radius: 6px;
  background: #ffffff;
  color: var(--ink);
  padding: 8px 10px;
}

textarea {
  resize: vertical;
}

.zoom-group {
  display: flex;
  gap: 8px;
  align-items: center;
}

.icon-btn,
.primary-btn,
.secondary-btn {
  min-height: 38px;
  border: 1px solid #b8c5ce;
  border-radius: 6px;
  background: #ffffff;
  color: var(--ink);
  padding: 8px 12px;
  font-weight: 700;
}

.icon-btn {
  width: 40px;
  padding: 0;
}

.primary-btn {
  border-color: var(--brand-red);
  background: var(--brand-red);
  color: #ffffff;
}

.secondary-btn:hover,
.icon-btn:hover {
  background: #f0f5f7;
}

.zoom-value {
  min-width: 58px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.comparison-shell {
  padding: 16px;
  overflow-x: auto;
}

.scale-strip {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
  color: var(--muted);
  font-size: 13px;
}

.comparison-stage {
  position: relative;
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr);
  gap: 24px;
  min-width: 720px;
  min-height: 350px;
  padding: 18px;
  background:
    linear-gradient(#edf2f5 1px, transparent 1px),
    linear-gradient(90deg, #edf2f5 1px, transparent 1px),
    #ffffff;
  background-size: 30px 30px;
  border: 1px solid #edf2f5;
  border-radius: 8px;
}

.package-lane {
  display: grid;
  grid-template-rows: auto 1fr auto;
  justify-items: center;
  min-height: 310px;
}

.lane-title {
  width: 100%;
  margin-bottom: 12px;
  text-align: center;
}

.lane-title span {
  display: block;
  margin-bottom: 3px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

.lane-title strong {
  display: block;
  font-size: 16px;
}

.package-floor {
  display: grid;
  align-items: end;
  justify-items: center;
  width: 100%;
  min-height: 235px;
  border-bottom: 2px solid #c9d3db;
}

.package-shape {
  position: relative;
  display: grid;
  place-items: center;
  max-width: 100%;
  border: 2px solid var(--blue);
  border-radius: 9px 9px 4px 4px;
  background: linear-gradient(135deg, #f8fbfc 0%, #d9eef4 100%);
  box-shadow: var(--shadow);
  transition: width 140ms ease, height 140ms ease;
}

.package-shape.ohme {
  border-color: var(--brand-red);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,228,223,0.9) 100%),
    repeating-linear-gradient(45deg, rgba(210,41,31,0.08) 0 18px, rgba(210,41,31,0.02) 18px 36px);
}

.package-shape.competitor {
  border-color: var(--blue);
}

.package-shape::before {
  content: "";
  position: absolute;
  top: 9px;
  left: 14px;
  right: 14px;
  height: 11px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
}

.package-shape::after {
  content: "";
  position: absolute;
  right: -11px;
  top: 12px;
  width: 10px;
  height: calc(100% - 14px);
  border-radius: 0 6px 6px 0;
  background: rgba(28, 90, 110, 0.2);
  transform: skewY(12deg);
}

.shape-inner {
  width: 100%;
  padding: 18px 12px 12px;
  text-align: center;
}

.shape-inner strong {
  display: block;
  font-size: 14px;
}

.shape-inner span {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.dimension-tag {
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
}

.delta-card {
  width: 100%;
  margin-top: 18px;
  padding: 12px;
  border: 1px solid #bfd1d8;
  border-radius: 8px;
  background: #f8fbfc;
  color: #344250;
  font-size: 14px;
  line-height: 1.4;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin: 18px 0;
}

.picker-section {
  margin-top: 18px;
  padding: 16px;
}

.section-head.compact {
  margin-bottom: 10px;
}

.picker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(154px, 1fr));
  gap: 10px;
}

.picker-card {
  display: grid;
  justify-items: center;
  align-content: end;
  gap: 5px;
  min-height: 146px;
  border: 1px solid #c3d0d9;
  border-radius: 8px;
  background: #ffffff;
  color: var(--ink);
  padding: 10px;
  text-align: center;
}

.picker-card:hover,
.picker-card.active {
  border-color: var(--blue);
  background: #eef7f9;
  box-shadow: inset 0 0 0 2px rgba(28, 90, 110, 0.12);
}

.mini-pack {
  display: grid;
  place-items: center;
  align-self: end;
  border: 2px solid var(--blue);
  border-radius: 7px 7px 4px 4px;
  background: linear-gradient(135deg, #f8fbfc 0%, #d9eef4 100%);
  color: #18495a;
  font-size: 10px;
  font-weight: 800;
  overflow: hidden;
}

.picker-card strong {
  font-size: 13px;
}

.picker-card small {
  min-height: 30px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.25;
}

.picker-card em {
  color: var(--blue);
  font-size: 11px;
  font-style: normal;
  font-weight: 700;
}

.detail-grid > article {
  padding: 16px;
}

.detail-grid dl {
  display: grid;
  grid-template-columns: 138px 1fr;
  gap: 8px 12px;
  margin: 0;
  font-size: 14px;
}

.detail-grid dt {
  color: var(--muted);
}

.detail-grid dd {
  margin: 0;
}

.claim-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.claim-list span {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--blue-soft);
  color: #174a5b;
  font-size: 12px;
  font-weight: 700;
}

.edit-section {
  padding: 16px;
}

.strategy-section {
  margin-bottom: 18px;
  padding: 16px;
}

.matrix-section {
  margin-bottom: 18px;
  padding: 16px;
}

.strategy-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.strategy-card {
  min-height: 126px;
  border: 1px solid #c3d0d9;
  border-radius: 8px;
  background: #fbfcfd;
  padding: 14px;
}

.strategy-card h3 {
  color: var(--brand-red);
}

.strategy-card p {
  color: #344250;
  font-size: 13px;
  line-height: 1.45;
}

.evidence-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 12px;
}

.evidence-item {
  border: 1px solid #c3d0d9;
  border-radius: 8px;
  background: #fbfcfd;
  padding: 12px;
}

.evidence-item strong {
  display: block;
  margin-bottom: 5px;
  color: var(--blue);
  font-size: 13px;
}

.amazon-section {
  border: 2px solid #ffb8aa;
  background: linear-gradient(180deg, #fffdfb 0%, #fff4ef 100%);
}

.amazon-kicker {
  display: inline-flex;
  width: fit-content;
  margin-bottom: 8px;
  padding: 4px 8px;
  border-radius: 4px;
  background: #232f3e;
  color: #ffffff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.amazon-section h2,
.amazon-section h3 {
  color: #232f3e;
}

.amazon-section .evidence-note {
  border-left-color: var(--brand-red);
  background: #ffe8e2;
}

.evidence-item p {
  margin: 0;
  color: #344250;
  font-size: 13px;
  line-height: 1.45;
}

.retailer-card p + p {
  margin-top: 8px;
}

.retailer-label {
  display: block;
  margin-bottom: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.evidence-note {
  margin-top: 12px;
  padding: 10px 12px;
  border-left: 4px solid var(--orange);
  background: var(--orange-soft);
  color: #4b3a2a;
  font-size: 13px;
  line-height: 1.45;
}

.costco-section {
  border: 2px solid var(--costco-red);
  background: linear-gradient(180deg, #ffffff 0%, #fff9f7 100%);
  box-shadow: 0 16px 36px rgba(114, 31, 31, 0.12);
  font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
}

.costco-section .section-head {
  padding-bottom: 12px;
  border-bottom: 2px solid rgba(179, 32, 42, 0.18);
}

.costco-section h2,
.costco-section h3 {
  color: #143f63;
}

.costco-kicker {
  display: inline-flex;
  width: fit-content;
  margin-bottom: 8px;
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--costco-red);
  color: #ffffff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.costco-section .evidence-item {
  border-color: #f0b9b9;
  background: #fffdfb;
}

.costco-section .evidence-item strong {
  color: var(--costco-blue);
}

.costco-summary-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin: 14px 0;
}

.costco-summary-card {
  border: 1px solid #efb5b5;
  border-left: 5px solid var(--costco-red);
  border-radius: 8px;
  background: #ffffff;
  padding: 12px;
}

.costco-summary-card h3 {
  margin-bottom: 6px;
  font-size: 13px;
}

.costco-summary-card p {
  margin: 0;
  color: #374151;
  font-size: 13px;
  line-height: 1.45;
}

.costco-amazon-card {
  margin: 14px 0;
  border: 1px solid #a9c9df;
  border-left: 5px solid var(--costco-blue);
  border-radius: 8px;
  background: var(--costco-blue-soft);
  padding: 12px;
}

.costco-amazon-card h3 {
  margin-bottom: 6px;
  color: #123f63;
}

.costco-amazon-card p {
  margin: 0 0 8px;
  color: #263745;
  font-size: 13px;
  line-height: 1.45;
}

.costco-amazon-card p:last-child {
  margin-bottom: 0;
}

.costco-matrix-block {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 2px solid rgba(23, 89, 140, 0.18);
}

.costco-section .matrix-table th {
  background: var(--costco-blue);
}

.costco-section .source-note {
  color: #4a5564;
}

.matrix-table-wrap {
  overflow-x: auto;
}

.matrix-table {
  min-width: 1360px;
}

.matrix-table td:first-child strong,
.matrix-table td:first-child span {
  display: block;
}

.matrix-table td:first-child span {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.matrix-table .claims-cell,
.matrix-table .comparison-cell {
  max-width: 280px;
  line-height: 1.35;
}

.section-head {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: start;
  margin-bottom: 12px;
}

.section-head p {
  max-width: 760px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.4;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 1220px;
  border-collapse: collapse;
  font-size: 13px;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 8px;
  text-align: left;
  vertical-align: top;
}

th {
  background: #174a5b;
  color: #ffffff;
  font-size: 12px;
}

td input,
td textarea {
  min-height: 34px;
  padding: 6px 8px;
  font-size: 13px;
}

td textarea {
  min-height: 60px;
}

.compare-btn,
.delete-btn {
  min-height: 34px;
  margin-right: 8px;
  border: 1px solid #d6aeb2;
  border-radius: 6px;
  background: #fff6f7;
  color: var(--danger);
  font-weight: 700;
}

.compare-btn {
  border-color: #9fc0ca;
  background: #eef7f9;
  color: var(--blue);
}

.selected-row {
  background: #eaf5f8;
  box-shadow: inset 4px 0 0 var(--blue);
}

.source-note {
  margin-top: 12px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.4;
}

@media (max-width: 920px) {
  .topbar, 
  .page-intro,
  .summary-grid,
  .callout-strip,
  .toolbar, 
  .detail-grid, 
  .strategy-grid,
  .evidence-list,
  .costco-summary-grid {
    grid-template-columns: 1fr;
  }

  main,
  .topbar {
    padding-left: 18px;
    padding-right: 18px;
  }

  h1 {
    font-size: 24px;
  }

  .comparison-stage {
    min-width: 680px;
  }
}

    </style>

    <div id="root"></div>

function numberOrNull(value) {
  if (value === "" || value === null || value === undefined) return null;
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function money(value) {
  const n = numberOrNull(value);
  return n === null ? "N/A" : `CAD $${n.toFixed(2)}`;
}

function pricePer100g(row) {
  const price = numberOrNull(row.priceCad);
  const totalG = numberOrNull(row.totalG);
  if (!price || !totalG) return null;
  return (price / totalG) * 100;
}

function pricePerUnit(row) {
  const price = numberOrNull(row.priceCad);
  const count = numberOrNull(row.count);
  if (!price || !count) return null;
  return price / count;
}

function pricePerGram(item) {
  const price = numberOrNull(item.priceCad);
  const weight = numberOrNull(item.weightG);
  const count = numberOrNull(item.packCount) || 1;
  if (!price || !weight || !count) return null;
  return price / (weight * count);
}

function netWeightText(item) {
  const weight = numberOrNull(item.weightG);
  const count = numberOrNull(item.packCount) || 1;
  if (!weight) return "N/A";
  if (item.brand === "OHME!" && count > 1) {
    return `Approx. ${weight} g total (${Math.round(weight / count)} g x ${count})`;
  }
  return count > 1 ? `${weight} g per unit; ${Math.round(weight * count)} g total` : `${weight} g per unit`;
}

function packagingCostText(item) {
  const cost = numberOrNull(item.packagingCostCad);
  if (cost === null) return "N/A";
  const count = numberOrNull(item.packCount) || 1;
  if (count > 1) {
    return `Approx. CAD $${cost.toFixed(2)} internal pouch cost (${count} x CAD $0.10); outer pack not included`;
  }
  return `Approx. CAD $${cost.toFixed(2)} per bag`;
}

function mmText(item) {
  const depth = item.depthMm ? ` x ${item.depthMm}D` : "";
  return `${item.widthMm}W x ${item.heightMm}H${depth} mm`;
}

function DifferenceNote({ ohme, competitor }) {
  const widthDiff = competitor.widthMm - ohme.widthMm;
  const heightDiff = competitor.heightMm - ohme.heightMm;
  const areaOhme = ohme.widthMm * ohme.heightMm;
  const areaComp = competitor.widthMm * competitor.heightMm;
  const areaPct = areaOhme ? ((areaComp / areaOhme - 1) * 100) : 0;
  const ppg = pricePerGram(competitor);
  return h("div", { className: "delta-card" },
    h("strong", null, "Notes on package size difference"),
    h("p", null,
      `${competitor.brand} is ${Math.abs(widthDiff).toFixed(0)} mm ${widthDiff >= 0 ? "wider" : "narrower"} and ${Math.abs(heightDiff).toFixed(0)} mm ${heightDiff >= 0 ? "taller" : "shorter"} than the selected OHME! package. Its front-face area is ${Math.abs(areaPct).toFixed(0)}% ${areaPct >= 0 ? "larger" : "smaller"}.`
    ),
    h("p", null,
      `Competitor price per gram: ${ppg === null ? "N/A" : `CAD $${ppg.toFixed(3)}/g`}. This should be read with pack count because many competitors sell small units inside a larger multipack.`
    )
  );
}

function EditableTable({ rows, setRows, selectedId, setSelectedId }) {
  function updateCell(id, key, value) {
    setRows((prev) => prev.map((row) => row.id === id ? { ...row, [key]: value } : row));
  }

  function addRow() {
    const id = `custom-${Date.now()}`;
    const row = {
      id,
      brand: "New brand",
      product: "New product",
      category: "New category",
      widthMm: 140,
      heightMm: 160,
      depthMm: 55,
      weightG: 30,
      packCount: 1,
      priceCad: 4.99,
      salesSignal: "Add sales signal",
      claims: "Healthy, convenient",
      channel: "Add channel",
      comparison: "Add comparison vs OHME!",
      notes: "Add package size notes",
    };
    setRows((prev) => [...prev, row]);
    setSelectedId(id);
  }

  function deleteRow(id) {
    setRows((prev) => {
      const next = prev.filter((row) => row.id !== id);
      if (selectedId === id && next[0]) setSelectedId(next[0].id);
      return next;
    });
  }

  const fields = [
    ["brand", "Brand", "text"],
    ["product", "Product", "text"],
    ["category", "Category", "text"],
    ["widthMm", "W mm", "number"],
    ["heightMm", "H mm", "number"],
    ["depthMm", "D mm", "number"],
    ["weightG", "g/unit", "number"],
    ["packCount", "Count", "number"],
    ["priceCad", "Price CAD", "number"],
    ["salesSignal", "Sales signal", "text"],
    ["claims", "Claims", "textarea"],
    ["channel", "Channel", "text"],
    ["comparison", "OHME comparison", "textarea"],
    ["notes", "Notes", "textarea"],
  ];

  return h("section", { className: "edit-section" },
    h("div", { className: "section-head" },
      h("div", null,
        h("h2", null, "Editable Competitor Data"),
        h("p", null, "Add or edit competitors here. The visual updates immediately from the table. Use width and height in millimetres.")
      ),
      h("button", { className: "primary-btn", onClick: addRow }, "Add competitor")
    ),
    h("div", { className: "table-wrap" },
      h("table", null,
        h("thead", null,
          h("tr", null,
            fields.map(([, label]) => h("th", { key: label }, label)),
            h("th", null, "Action")
          )
        ),
        h("tbody", null,
          rows.map((row) => h("tr", { key: row.id, className: row.id === selectedId ? "selected-row" : "" },
            fields.map(([key, , type]) => h("td", { key: key },
              type === "textarea"
                ? h("textarea", {
                    value: row[key] ?? "",
                    onChange: (e) => updateCell(row.id, key, e.target.value),
                  })
                : h("input", {
                    type,
                    value: row[key] ?? "",
                    step: type === "number" ? "0.01" : undefined,
                    onChange: (e) => updateCell(row.id, key, type === "number" ? numberOrNull(e.target.value) : e.target.value),
                  })
            )),
            h("td", null,
              h("button", {
                className: "compare-btn",
                "aria-label": `Compare ${row.brand} ${row.product}`,
                onClick: () => setSelectedId(row.id),
              }, "Compare"),
              h("button", {
                className: "delete-btn",
                "aria-label": `Delete ${row.brand} ${row.product}`,
                onClick: () => deleteRow(row.id),
              }, "Delete")
            )
          ))
        )
      )
    ),
    h("p", { className: "source-note" },
      "No image generation is used. Package shapes are CSS rectangles drawn from width and height values."
    )
  );
}
