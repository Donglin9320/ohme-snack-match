:root {

* {

input,

button {

.eyebrow {

h1,
h2,
h3,

h1 {

h2 {

}

h3 {

}

.top-note {

main {

.toolbar,

label {

select,

textarea {

textarea {

.zoom-group {

.icon-btn,
.primary-btn,
.secondary-btn {

.icon-btn {

.primary-btn {

.secondary-btn:hover,

.zoom-value {

.comparison-shell {

.scale-strip {

}

.lane-title {

.lane-title span {

  font-weight: 700;

}

.lane-title strong {
  display: block;
  font-size: 16px;
}

.package-floor {

  align-items: end;

.package-shape {

.package-shape.competitor {

}

  left: 14px;
  right: 14px;
  height: 11px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
}

.package-shape::after {
  content: "";
  position: absolute;
  right: -11px;
  top: 12px;
  width: 10px;
  height: calc(100% - 14px);
  border-radius: 0 6px 6px 0;
  background: rgba(28, 90, 110, 0.2);
  transform: skewY(12deg);
}

.shape-inner {
  width: 100%;
  padding: 18px 12px 12px;
  text-align: center;
}

.shape-inner strong {
  display: block;
  font-size: 14px;
}

.shape-inner span {

  font-size: 12px;

.picker-section {

.edit-section {

.strategy-section {

.matrix-section {

  .comparison-stage {
    min-width: 680px;
  }
}

function numberOrNull(value) {
  if (value === "" || value === null || value === undefined) return null;
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function money(value) {
  const n = numberOrNull(value);
  return n === null ? "N/A" : `CAD $${n.toFixed(2)}`;
}

function pricePerGram(item) {
  const price = numberOrNull(item.priceCad);
  const weight = numberOrNull(item.weightG);
  const count = numberOrNull(item.packCount) || 1;
  if (!price || !weight || !count) return null;
  return price / (weight * count);
}

function netWeightText(item) {
  const weight = numberOrNull(item.weightG);
  const count = numberOrNull(item.packCount) || 1;
  if (!weight) return "N/A";
  if (item.brand === "OHME!" && count > 1) {
    return `Approx. ${weight} g total (${Math.round(weight / count)} g x ${count})`;
  }
  return count > 1 ? `${weight} g per unit; ${Math.round(weight * count)} g total` : `${weight} g per unit`;
}

function packagingCostText(item) {
  const cost = numberOrNull(item.packagingCostCad);
  if (cost === null) return "N/A";
  const count = numberOrNull(item.packCount) || 1;
  if (count > 1) {
    return `Approx. CAD $${cost.toFixed(2)} internal pouch cost (${count} x CAD $0.10); outer pack not included`;
  }
  return `Approx. CAD $${cost.toFixed(2)} per bag`;
}

function mmText(item) {
  const depth = item.depthMm ? ` x ${item.depthMm}D` : "";
  return `${item.widthMm}W x ${item.heightMm}H${depth} mm`;

  const hgt = Math.max(56, item.heightMm * scale);
  return h("div", { className: "package-lane" },
    h("div", { className: "lane-title" },
      h("span", null, type === "ohme" ? "OHME! reference" : "Competitor"),
      h("strong", null, `${item.brand} ${item.product}`)
    ),
    h("div", { className: "package-floor" },
      h("div", {
        className: `package-shape ${type}`,
        style: { width: `${w}px`, height: `${hgt}px` },
        title: `${item.brand} ${item.product}: ${mmText(item)}`,
      },
        h("div", { className: "shape-inner" },
          h("strong", null, item.brand),
          h("span", null, `${item.weightG || "?"}g unit`)
        )
      )
    ),
    h("div", { className: "dimension-tag" }, mmText(item))
  );
}

function DetailPanel({ title, item }) {
  const ppg = pricePerGram(item);
  const claims = String(item.claims || "").split(",").map((x) => x.trim()).filter(Boolean);
  return h("article", null,
    h("h2", null, title),
    h("dl", null,
      h("dt", null, "Width"),
      h("dd", null, `${item.widthMm || "N/A"} mm`),
      h("dt", null, "Height"),
      h("dd", null, `${item.heightMm || "N/A"} mm`),
      h("dt", null, "Net weight"),
      h("dd", null, netWeightText(item)),
      h("dt", null, "Pack count"),
      h("dd", null, `${item.packCount || 1}`),
      h("dt", null, "Price"),
      h("dd", null, money(item.priceCad)),
      h("dt", null, "Packaging cost"),
      h("dd", null, packagingCostText(item)),
      h("dt", null, "Price per gram"),
      h("dd", null, ppg === null ? "N/A" : `CAD $${ppg.toFixed(3)}/g`),
      h("dt", null, "Sales signal"),
      h("dd", null, item.salesSignal || "N/A"),
      h("dt", null, "Channel"),
      h("dd", null, item.channel || "N/A"),
      h("dt", null, "Claims"),
      h("dd", { className: "claim-list" }, claims.length ? claims.map((claim) => h("span", { key: claim }, claim)) : "N/A"),
      h("dt", null, "Notes"),
      h("dd", null, item.notes || "N/A")
    )
  );
}

function DifferenceNote({ ohme, competitor }) {
  const widthDiff = competitor.widthMm - ohme.widthMm;
  const heightDiff = competitor.heightMm - ohme.heightMm;
  const areaOhme = ohme.widthMm * ohme.heightMm;
  const areaComp = competitor.widthMm * competitor.heightMm;
  const areaPct = areaOhme ? ((areaComp / areaOhme - 1) * 100) : 0;
  const ppg = pricePerGram(competitor);
  return h("div", { className: "delta-card" },
    h("strong", null, "Notes on package size difference"),
    h("p", null,
      `${competitor.brand} is ${Math.abs(widthDiff).toFixed(0)} mm ${widthDiff >= 0 ? "wider" : "narrower"} and ${Math.abs(heightDiff).toFixed(0)} mm ${heightDiff >= 0 ? "taller" : "shorter"} than the selected OHME! package. Its front-face area is ${Math.abs(areaPct).toFixed(0)}% ${areaPct >= 0 ? "larger" : "smaller"}.`
    ),
    h("p", null,
      `Competitor price per gram: ${ppg === null ? "N/A" : `CAD $${ppg.toFixed(3)}/g`}. This should be read with pack count because many competitors sell small units inside a larger multipack.`
    )
  );
}

function CompetitorPicker({ competitors, selectedId, setSelectedId }) {
  return h("section", { className: "picker-section", "aria-label": "Competitor package picker" },
    h("div", { className: "section-head compact" },
      h("div", null,
        h("h2", null, "Click a competitor package to compare"),
        h("p", null, "These mini packs are selection controls. The main comparison above uses the exact same scale for OHME! and the chosen competitor.")
      )
    ),
    h("div", { className: "picker-grid" },
      competitors.map((item) => {
        const miniW = Math.max(36, Math.min(92, item.widthMm * 0.22));
        const miniH = Math.max(34, Math.min(76, item.heightMm * 0.22));
        return h("button", {
          key: item.id,
          className: `picker-card ${item.id === selectedId ? "active" : ""}`,
          onClick: () => setSelectedId(item.id),
          "aria-label": `Select ${item.brand} ${item.product}`,
        },
          h("span", {
            className: "mini-pack",
            style: { width: `${miniW}px`, height: `${miniH}px` },
          }, item.brand.slice(0, 10)),
          h("strong", null, item.brand),
          h("small", null, item.product),
          h("em", null, `${item.weightG || "?"}g x ${item.packCount || 1}`)
        );
      })
    )
  );
}

function EditableTable({ rows, setRows, selectedId, setSelectedId }) {
  function updateCell(id, key, value) {
    setRows((prev) => prev.map((row) => row.id === id ? { ...row, [key]: value } : row));
  }

  function addRow() {
    const id = `custom-${Date.now()}`;
    const row = {
      id,
      brand: "New brand",
      product: "New product",
      category: "New category",
      widthMm: 140,
      heightMm: 160,
      depthMm: 55,
      weightG: 30,
      packCount: 1,
      priceCad: 4.99,
      salesSignal: "Add sales signal",
      claims: "Healthy, convenient",
      channel: "Add channel",
      comparison: "Add comparison vs OHME!",
      notes: "Add package size notes",
    };
    setRows((prev) => [...prev, row]);
    setSelectedId(id);
  }

  function deleteRow(id) {
    setRows((prev) => {
      const next = prev.filter((row) => row.id !== id);
      if (selectedId === id && next[0]) setSelectedId(next[0].id);
      return next;
    });
  }

  const fields = [
    ["brand", "Brand", "text"],
    ["product", "Product", "text"],
    ["category", "Category", "text"],
    ["widthMm", "W mm", "number"],
    ["heightMm", "H mm", "number"],
    ["depthMm", "D mm", "number"],
    ["weightG", "g/unit", "number"],
    ["packCount", "Count", "number"],
    ["priceCad", "Price CAD", "number"],
    ["salesSignal", "Sales signal", "text"],
    ["claims", "Claims", "textarea"],
    ["channel", "Channel", "text"],
    ["comparison", "OHME comparison", "textarea"],
    ["notes", "Notes", "textarea"],
  ];

  return h("section", { className: "edit-section" },
    h("div", { className: "section-head" },
      h("div", null,
        h("h2", null, "Editable Competitor Data"),
        h("p", null, "Add or edit competitors here. The visual updates immediately from the table. Use width and height in millimetres.")
      ),
      h("button", { className: "primary-btn", onClick: addRow }, "Add competitor")
    ),
    h("div", { className: "table-wrap" },
      h("table", null,
        h("thead", null,
          h("tr", null,
            fields.map(([, label]) => h("th", { key: label }, label)),
            h("th", null, "Action")
          )
        ),
        h("tbody", null,
          rows.map((row) => h("tr", { key: row.id, className: row.id === selectedId ? "selected-row" : "" },
            fields.map(([key, , type]) => h("td", { key: key },
              type === "textarea"
                ? h("textarea", {
                    value: row[key] ?? "",
                    onChange: (e) => updateCell(row.id, key, e.target.value),
                  })
                : h("input", {
                    type,
                    value: row[key] ?? "",
                    step: type === "number" ? "0.01" : undefined,
                    onChange: (e) => updateCell(row.id, key, type === "number" ? numberOrNull(e.target.value) : e.target.value),
                  })
            )),
            h("td", null,
              h("button", {
                className: "compare-btn",
                "aria-label": `Compare ${row.brand} ${row.product}`,
                onClick: () => setSelectedId(row.id),
              }, "Compare"),
              h("button", {
                className: "delete-btn",
                "aria-label": `Delete ${row.brand} ${row.product}`,
                onClick: () => deleteRow(row.id),
              }, "Delete")
            )
          ))
        )
      )
    ),
    h("p", { className: "source-note" },
      "No image generation is used. Package shapes are CSS rectangles drawn from width and height values."
    )
  );
}

function CompetitorMatrixSection({ competitors }) {
  const rows = competitors.filter((row) => row.id !== "placeholder-future");
  return h("section", { className: "matrix-section" },
    h("div", { className: "section-head compact" },
      h("div", null,
        h("h2", null, "Competitor Matrix"),
        h("p", null, "Use this view to present the package, price, sales signal, claims, channel, and direct comparison against OHME! in one place.")
      )
    ),
    h("div", { className: "matrix-table-wrap" },
      h("table", { className: "matrix-table" },
        h("thead", null,
          h("tr", null,
            ["Brand / Product", "Category", "Pack format", "Physical package size", "Price", "Price / gram", "Sales signal", "Claims", "Channel", "Comparison vs OHME!"]
              .map((label) => h("th", { key: label }, label))
          )
        ),
        h("tbody", null,
          rows.map((row) => {
            const ppg = pricePerGram(row);
            return h("tr", { key: row.id },
              h("td", null, h("strong", null, row.brand), h("span", null, row.product)),
              h("td", null, row.category || "N/A"),
              h("td", null, netWeightText(row)),
              h("td", null, mmText(row)),
              h("td", null, money(row.priceCad)),
              h("td", null, ppg === null ? "N/A" : `CAD $${ppg.toFixed(3)}/g`),
              h("td", null, row.salesSignal || "N/A"),
              h("td", { className: "claims-cell" }, row.claims || "N/A"),
              h("td", null, row.channel || "N/A"),
              h("td", { className: "comparison-cell" }, row.comparison || row.notes || "N/A")
            );
          })
        )
      )
    )
  );
}

function StrategySection() {
  const cards = [
    {
      title: "Small pouch",
      text: "Use the 130 mm x 155 mm pouch for campus, office, gym, vending, convenience stores, and trial. This recommendation comes from the small-unit competitor pattern and portion-control evidence.",
    },
    {
      title: "Multipack",
      text: "Test 6/8/12-pack snack pouch options. The 8-pack should be the first survey/pilot option because Quest uses an 8-count box and many competitors sell small units inside a larger pack.",
    },
    {
      title: "Regular pouch",
      text: "Keep the regular pouch for online, home, sharing, and stock-up. This format fits buyers who care more about value and fewer shopping trips.",
    },
  ];

  return h("section", { className: "strategy-section" },
    h("div", { className: "section-head compact" },
      h("div", null,
        h("h2", null, "Package strategy notes"),
        h("p", null, "Use these notes as quick context while comparing OHME! package sizes against competitor packs.")
      )
    ),
    h("div", { className: "strategy-grid" },
      cards.map((card) => h("article", { key: card.title, className: "strategy-card" },
        h("h3", null, card.title),
        h("p", null, card.text)
      ))
    )
  );
}

function EvidenceChainSection() {
  const evidence = [
    {
      title: "Han package note",
      text: "OHME! snack pouch is 130W x 155H mm with about CAD 0.10 bag cost. Regular pouches are larger and about CAD 0.50 per bag. This creates two different package roles: portable/trial and home/stock-up.",
    },
    {
      title: "Quest + better-for-you sales signal",
      text: "Quest sells 8 x 32g protein-chip bags. Snack Food & Wholesale Bakery reports Quest brand snacks grew 37.9% in better-for-you puffed/extruded snacks. This supports testing an 8-pack, but it is not exact pack-size sales.",
    },
    {
      title: "PopCorners multipack signal",
      text: "Walmart Canada lists PopCorners as 15 x 18g bags, CAD 10.77, and 1000+ bought in the past month when checked. This shows a small-unit multipack with a visible retailer demand signal.",
    },
    {
      title: "MadeGood and That's it.",
      text: "MadeGood uses 24g individual bags and That's it. sells 24 x 20g mini fruit bars. These are close benchmarks for OHME!'s small pouch, lunchbox, office, workout, and on-the-go occasions.",
    },
    {
      title: "Package-size behavior research",
      text: "A package-size study links smaller packages with lower purchase volume and higher unit prices. Hartman notes that single-serve packs help portion control but can raise waste concerns.",
    },
    {
      title: "Strategy conclusion",
      text: "Keep the regular pouch, test the snack pouch by occasion, and use the survey to compare 6-pack, 8-pack, and 12-pack options with price per pack, price per gram, convenience, and waste concerns.",
    },
  ];

  return h("section", { className: "strategy-section" },
    h("div", { className: "section-head compact" },
      h("div", null,
        h("h2", null, "How the package strategy was built"),
        h("p", null, "The recommendation is based on source-backed package formats, public sales or retailer signals, and package-behavior research. Public sources usually do not report sales by exact package size.")
      )
    ),
    h("div", { className: "evidence-list" },
      evidence.map((item) => h("article", { key: item.title, className: "evidence-item" },
        h("strong", null, item.title),
        h("p", null, item.text)
      ))
    ),
    h("p", { className: "evidence-note" },
      "Use this as a testable strategy, not a final launch decision. Exact sales by package size should be checked through OHME! survey results, retailer feedback, direct company data if available, or a small pilot."
    )
  );
}

function App() {
  const [selectedOhmeId, setSelectedOhmeId] = useState(ohmePackages[0].id);
  const [competitors, setCompetitors] = useState(starterCompetitors);
  const [selectedCompetitorId, setSelectedCompetitorId] = useState(starterCompetitors[0].id);
  const [zoom, setZoom] = useState(1);

  const selectedOhme = useMemo(
    () => ohmePackages.find((item) => item.id === selectedOhmeId) || ohmePackages[0],
    [selectedOhmeId]
  );
  const selectedCompetitor = useMemo(
    () => competitors.find((item) => item.id === selectedCompetitorId) || competitors[0],
    [competitors, selectedCompetitorId]
  );

  const scaleText = `Scale: 1 mm = ${(0.72 * zoom).toFixed(2)} px`;

  return h("div", { className: "app" },
    h("header", { className: "topbar" },
      h("div", null,
        h("p", { className: "eyebrow" }, "OHME! package size comparator"),
        h("h1", null, "Compare OHME! package formats against competitor packs")
      ),
      h("div", { className: "top-note" },
        h("strong", null, "No image generation. "),
        "This tool draws package rectangles with HTML/CSS/React from package dimensions."
      )
    ),
    h("main", null,
      h("section", { className: "toolbar", "aria-label": "Package controls" },
        h("label", null,
          "OHME! package size",
          h("select", { value: selectedOhmeId, onChange: (e) => setSelectedOhmeId(e.target.value) },
            ohmePackages.map((item) => h("option", { key: item.id, value: item.id }, `${item.product} — ${item.widthMm}W x ${item.heightMm}H mm`))
          )
        ),
        h("label", null,
          "Competitor product",
          h("select", { value: selectedCompetitor.id, onChange: (e) => setSelectedCompetitorId(e.target.value) },
            competitors.map((item) => h("option", { key: item.id, value: item.id }, `${item.brand} — ${item.product}`))
          )
        ),
        h("label", null,
          "Zoom",
          h("div", { className: "zoom-group" },
            h("button", {
              className: "icon-btn",
              "aria-label": "Zoom out",
              onClick: () => setZoom((z) => Math.max(0.45, +(z - 0.15).toFixed(2))),
            }, "-"),
            h("span", { className: "zoom-value" }, `${Math.round(zoom * 100)}%`),
            h("button", {
              className: "icon-btn",
              "aria-label": "Zoom in",
              onClick: () => setZoom((z) => Math.min(2.2, +(z + 0.15).toFixed(2))),
            }, "+")
          )
        ),
        h("button", { className: "secondary-btn", onClick: () => setZoom(1) }, "Reset zoom")
      ),

      h("section", { className: "comparison-shell" },
        h("div", { className: "scale-strip" },
          h("span", null, "Front view compares width x height at the same scale."),
          h("span", null, scaleText)
        ),
        h("div", { className: "comparison-stage" },
          h(PackageCard, { item: selectedOhme, type: "ohme", zoom }),
          h(PackageCard, { item: selectedCompetitor, type: "competitor", zoom })
        ),
        h(DifferenceNote, { ohme: selectedOhme, competitor: selectedCompetitor })
      ),

      h(CompetitorPicker, {
        competitors,
        selectedId: selectedCompetitorId,
        setSelectedId: setSelectedCompetitorId,
      }),

      h("section", { className: "detail-grid" },
        h(DetailPanel, { title: "OHME! package details", item: selectedOhme }),
        h(DetailPanel, { title: "Competitor package details", item: selectedCompetitor })
      ),

      h(StrategySection),
      h(EvidenceChainSection),

      h(CompetitorMatrixSection, { competitors }),

      h(EditableTable, {
        rows: competitors,
        setRows: setCompetitors,
        selectedId: selectedCompetitorId,
        setSelectedId: setSelectedCompetitorId,
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

    </script>
  </body>
</html>
